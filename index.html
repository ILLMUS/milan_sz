<!doctype html>
<html lang="en">
  <head>
    <!-- =========================
         CORE META
    ========================= -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <meta name="format-detection" content="telephone=no" />

    <!-- =========================
         DEFAULT TITLE + DESCRIPTION
         (Helmet will override on pages)
    ========================= -->
    <title>Milan_sz | Premium Hotel Amenities Supplier</title>

    <meta
      name="description"
      content="Premium hotel, guesthouse, Airbnb and lodge amenities supplier in Eswatini. Bulk soap, lotion, shower caps, shampoo and hospitality restocking."
    />

    <meta name="author" content="Milan_sz" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large"
    />

    <!-- =========================
         CANONICAL
    ========================= -->
    <link rel="canonical" href="https://www.milanszsupplies.com/" />

    <!-- =========================
         FAVICONS
    ========================= -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- =========================
         PERFORMANCE
    ========================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <!-- =========================
         OPEN GRAPH FALLBACK
         (Helmet can override)
    ========================= -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Milan_sz" />
    <meta property="og:url" content="https://www.milanszsupplies.com/" />

    <meta
      property="og:title"
      content="Milan_sz | Premium Hotel, Guesthouse & Airbnb Amenities Supplier"
    />

    <meta
      property="og:description"
      content="Luxury hospitality toiletries and amenities for hotels, guesthouses, lodges and Airbnbs in Eswatini."
    />

    <meta
      property="og:image"
      content="https://www.milanszsupplies.com/og/milan-gold-preview.png"
    />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- =========================
         TWITTER / X FALLBACK
    ========================= -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Milan_sz | Premium Hotel Amenities Supplier"
    />

    <meta
      name="twitter:description"
      content="Bulk hotel and guesthouse toiletries supplier in Eswatini."
    />

    <meta
      name="twitter:image"
      content="https://www.milanszsupplies.com/og/milan-gold-preview.png"
    />

    <!-- =========================
         GEO TAGS
    ========================= -->
    <meta name="geo.region" content="SZ" />
    <meta name="geo.country" content="Eswatini" />
    <meta name="geo.placename" content="Eswatini" />
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
