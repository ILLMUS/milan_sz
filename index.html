<!doctype html>
<html lang="en">
  <head>
    <!-- =====================================
         CORE META
    ====================================== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <meta name="format-detection" content="telephone=no" />

    <!-- =====================================
         PRIMARY SEO
    ====================================== -->
    <title>Milan_sz Supplies | Premium Hotel Amenities Supplier in Eswatini</title>

    <meta
      name="description"
      content="Milan_sz Supplies supplies premium hotel, guesthouse, Airbnb and lodge amenities in Eswatini. Bulk soap, lotion, shampoo, shower caps, shower gel and reliable hospitality restocking."
    />

    <meta
      name="keywords"
      content="Milan_sz Supplies, hotel amenities Eswatini, guesthouse supplies, Airbnb toiletries, lodge amenities, hotel soap wholesale, shower cap supplier, hospitality products Eswatini"
    />

    <meta name="author" content="Milan_sz Supplies" />

    <meta
      name="robots"
      content="index, follow, max-image-preview:large"
    />

    <!-- =====================================
         CANONICAL
    ====================================== -->
    <link
      rel="canonical"
      href="https://www.milanszsupplies.com/"
    />

    <!-- =====================================
         FAVICONS
    ====================================== -->
    <link
      rel="icon"
      type="image/x-icon"
      href="/favicon.ico"
    />

    <link
      rel="apple-touch-icon"
      href="/apple-touch-icon.png"
    />

    <!-- =====================================
         PERFORMANCE
    ====================================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <!-- =====================================
         OPEN GRAPH
         Facebook / WhatsApp / Messenger
         LinkedIn / Telegram
    ====================================== -->
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />

    <meta
      property="og:site_name"
      content="Milan_sz Supplies"
    />

    <meta
      property="og:url"
      content="https://www.milanszsupplies.com/"
    />

    <meta
      property="og:title"
      content="Milan_sz Supplies | Premium Hotel Amenities Supplier in Eswatini"
    />

    <meta
      property="og:description"
      content="Luxury hospitality toiletries and amenities for hotels, guesthouses, lodges and Airbnbs in Eswatini. Bulk supply available."
    />

    <meta
      property="og:image"
      content="https://www.milanszsupplies.com/og-cover.png"
    />

    <meta
      property="og:image:secure_url"
      content="https://www.milanszsupplies.com/og-cover.png"
    />

    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta
      property="og:image:alt"
      content="Milan_sz Supplies premium hotel amenities in Eswatini"
    />

    <!-- =====================================
         TWITTER / X
    ====================================== -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Milan_sz Supplies | Premium Hotel Amenities Supplier"
    />

    <meta
      name="twitter:description"
      content="Bulk hotel and guesthouse toiletries supplier in Eswatini."
    />

    <meta
      name="twitter:image"
      content="https://www.milanszsupplies.com/og-cover.png"
    />

    <!-- =====================================
         WHATSAPP / EXTRA SHARE SUPPORT
    ====================================== -->
    <meta
      property="og:image:url"
      content="https://www.milanszsupplies.com/og-cover.png"
    />

    <!-- =====================================
         GEO SEO
    ====================================== -->
    <meta name="geo.region" content="SZ" />
    <meta name="geo.country" content="Eswatini" />
    <meta name="geo.placename" content="Eswatini" />

    <!-- =====================================
         OPTIONAL APPLE
    ====================================== -->
    <meta
      name="apple-mobile-web-app-capable"
      content="yes"
    />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black"
    />

    <!-- =====================================
         FACEBOOK DOMAIN VERIFICATION
         (Insert later if needed)
    ====================================== -->
    <!-- <meta name="facebook-domain-verification" content="YOUR_CODE_HERE" /> -->

  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</head>
